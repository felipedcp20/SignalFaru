services:
  signalfaru:
    build: .
    container_name: signalfaru
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/signalfaru.db
    volumes:
      - signalfaru_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  signalfaru_data:
    driver: local
